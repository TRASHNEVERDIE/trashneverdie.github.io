<style>

body{
background:black;

font-family:monospace;

}

/* NAV */

nav{
text-align:center;
padding:20px;
border-bottom:1px solid #00ff9c;
}

nav a{
color:#00ff9c;
margin:20px;

}

/* GLITCH LOGO */

.logo{
font-size:60px;
text-align:center;
margin-top:40px;
animation:glitch 1s infinite;
}

@keyframes glitch{

0%{text-shadow:3px 0 red}
50%{text-shadow:-3px 0 cyan}
100%{text-shadow:3px 0 red}

}

/* PRODUCTS */

.products{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
padding:80px;

}

.card{

border:1px solid #00ff9c;
padding:30px;
text-align:center;

}

.card:hover{

box-shadow:0 0 20px #00ff9c;

}

button{

background:#00ff9c;
border:none;
padding:10px 20px;
cursor:pointer;

}

/* CURSOR TRAIL */

.trail{
position:fixed;
width:5px;
height:5px;
background:#00ff9c;
pointer-events:none;
}

</style>
</head>

<script>

/* CURSOR TRAIL */

document.addEventListener("mousemove",function(e){

let t=document.createElement("div")

t.className="trail"

t.style.left=e.pageX+"px"
t.style.top=e.pageY+"px"

document.body.appendChild(t)

setTimeout(()=>{t.remove()},300)

})

/* HIDDEN PAGE */

let secret="dev"
let input=""

document.addEventListener("keypress",function(e){

input+=e.key

if(input.includes(secret)){

window.location="dev.html"

}
