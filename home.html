<!DOCTYPE html>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
margin:0;
overflow-x:hidden;
cursor:crosshair;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:black;
border-bottom:1px solid #00ff9c;
padding:15px;
text-align:center;
z-index:10;
}

nav a{
color:#00ff9c;
margin:20px;
text-decoration:none;
font-size:18px;
}

nav a:hover{

}

/* LOGO */

.logo{
font-size:50px;
text-align:center;
margin-top:120px;
animation:glitch 1s infinite;
}

@keyframes glitch{
0%{text-shadow:2px 0 red}
50%{text-shadow:-2px 0 cyan}
100%{text-shadow:2px 0 red}
}

/* PRODUCT GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:80px;
}

.card{
border:1px solid #00ff9c;
padding:25px;
text-align:center;
background:#050505;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff9c;
}

button{
background:#00ff9c;
border:none;
padding:10px 20px;
margin-top:15px;
cursor:pointer;
}

/* CONTACT */

.contact{
text-align:center;
padding:80px;
}

.contact a{
display:block;
margin:10px;
color:#00ff9c;
font-size:18px;
}

/* MATRIX */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ADMIN PANEL */

#admin{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
border:1px solid #00ff9c;
padding:30px;
}

</style>
</head>

<script>

/* MATRIX RAIN */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

let letters="01TRASHNEVERDIE"
letters=letters.split("")

let font=14
let columns=canvas.width/font
let drops=[]

for(let x=0;x<columns;x++)
drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff9c"
ctx.font=font+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*font,drops[i]*font)

if(drops[i]*font>canvas.height&&Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,35)

/* DOWNLOAD */

function download(){

alert("Download system coming soon.")

}

/* ADMIN SECRET */

document.addEventListener("keydown",function(e){

if(e.key=="F9"){

document.getElementById("admin").style.display="block"

}

})

function login(){

let p=document.getElementById("pass").value

if(p=="trashneverdie"){

alert("Access granted")

window.location="dev.html"

}else{

alert("Access denied")

}

}

</script>
