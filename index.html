<!DOCTYPE html>
<html>
<head>

<title>TRASHNEVERDIE</title>

<style>

body{
margin:0;
background:black;
color:#00ff9c;
font-family:monospace;
overflow:hidden;
}

/* MATRIX */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* TERMINAL */

#terminal{
padding:40px;
}

input{
background:black;
border:none;
color:#00ff9c;
font-family:monospace;
font-size:16px;
outline:none;
}

/* HOME PAGE */

#home{
display:none;
text-align:center;
padding-top:100px;
}

/* LOGO */

.logo{
font-size:60px;
animation:spin 8s linear infinite;
}

@keyframes spin{

0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}

}

/* PRODUCT */

.product{
border:1px solid #00ff9c;
margin:20px;
padding:20px;
display:inline-block;
}

/* CURSOR PARTICLE */

.particle{
position:absolute;
width:4px;
height:4px;
background:#00ff9c;
border-radius:50%;
pointer-events:none;
animation:fade .6s linear;
}

@keyframes fade{
0%{opacity:1}
100%{opacity:0;transform:scale(3)}
}

</style>

<body>

<canvas id="matrix"></canvas>

<!-- TERMINAL -->

<div id="terminal">

<div id="output"></div>

> <input id="cmd" autofocus>

</div>

<!-- HOME -->

<div id="home">

<div class="logo">TRASHNEVERDIE</div>

<p>One Developer. One Mind.</p>

<h2>Products</h2>

<div class="product">

<h3>Advanced Anti Cheat</h3>

<script>

/* MATRIX */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="01TRASHNEVERDIE"
const fontSize=16
const columns=canvas.width/fontSize

const drops=[]

for(let i=0;i<columns;i++)
drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff9c"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

/* TERMINAL */

const input=document.getElementById("cmd")
const output=document.getElementById("output")

function print(t){

output.innerHTML+=t+"<br>"

}

print("TRASHNEVERDIE TERMINAL")
print("type help")

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=input.value.toLowerCase()

print("> "+cmd)

run(cmd)

input.value=""

}

})

function run(cmd){

if(cmd==="help"){

print("commands:")
print("scan")
print("about")
print("products")
print("discord")
print("enter")

}

else if(cmd==="scan"){

print("Scanning network...")

setTimeout(()=>print("Firewall bypassed"),1000)
setTimeout(()=>print("Accessing database..."),2000)
setTimeout(()=>print("Access granted"),3000)

}

else if(cmd==="about"){

print("TRASHNEVERDIE COMPANY")

}

else if(cmd==="products"){

print("Anti Cheat")
print("Security System")

}

else if(cmd==="discord"){

window.open("https://discord.gg/4C9S2b3jwu")

}

else if(cmd==="enter"){

document.getElementById("terminal").style.display="none"
document.getElementById("home").style.display="block"

}

else{

print("Unknown command")

}

}

/* CURSOR PARTICLE */

document.addEventListener("mousemove",e=>{

const p=document.createElement("div")

p.className="particle"

p.style.left=e.pageX+"px"
p.style.top=e.pageY+"px"

document.body.appendChild(p)

setTimeout(()=>p.remove(),600)

})

/* SECRET ADMIN */

let secret="shadow"
let buffer=""

document.addEventListener("keydown",e=>{

buffer+=e.key

if(buffer.includes(secret)){

alert("ADMIN ACCESS GRANTED")

}

})

/* FAKE IP */

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>console.log("IP:",d.ip))

</script>
