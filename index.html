<!DOCTYPE html>
<html>
<head>
<title>TRASHNEVERDIE TERMINAL</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
margin:0;
overflow:hidden;
}

/* LOADING */

#loading{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
}

/* TERMINAL */

#terminal{
padding:40px;
display:none;
}

input{
background:black;
border:none;
color:#00ff9c;
font-family:monospace;
font-size:18px;
outline:none;
width:80%;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>
</head>

<body>

<div id="loading">
Initializing System...
</div>

<canvas id="matrix"></canvas>

<div id="terminal">

<div id="output">
TRASHNEVERDIE SECURE TERMINAL<br><br>
type <b>help</b> to begin<br><br>
</div>

<div>
> <input id="cmd" autofocus>
</div>

</div>

<script>

/* LOADING */

setTimeout(()=>{
document.getElementById("loading").style.display="none"
document.getElementById("terminal").style.display="block"
},3000)


/* MATRIX */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

let letters="01TRASHNEVERDIE"
letters=letters.split("")

let font=14
let columns=canvas.width/font
let drops=[]

for(let x=0;x<columns;x++) drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff9c"
ctx.font=font+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*font,drops[i]*font)

if(drops[i]*font>canvas.height&&Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)


/* TERMINAL COMMAND */

const input=document.getElementById("cmd")
const output=document.getElementById("output")

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=input.value.toLowerCase()

output.innerHTML+="<br>> "+cmd+"<br>"

if(cmd==="help"){

output.innerHTML+=`
commands:<br>
help<br>
enter<br>
products<br>
about<br>
contact<br>
`

}

else if(cmd==="enter"){

output.innerHTML+="Accessing system..."

setTimeout(()=>{
window.location="home.html"
},1500)

}

else if(cmd==="products"){

window.location="home.html#products"

}

else if(cmd==="about"){

output.innerHTML+="TRASHNEVERDIE COMPANY - Independent Developer System"

}

else if(cmd==="contact"){

output.innerHTML+="Discord / Facebook / TikTok available on site"

}

else{

output.innerHTML+="command not found"

}

input.value=""

}

})

</script>

</body>
</html>
